name: Backend Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  guard-tests:
    name: Guard Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runtime
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.104.1 \
            uvicorn==0.24.0 \
            pydantic==2.5.0 \
            email-validator \
            python-multipart==0.0.6 \
            PyJWT==2.11.0 \
            aiohttp==3.9.1 \
            prometheus-client==0.21.1 \
            pytest==7.4.3 \
            httpx==0.25.2

      - name: Run datetime policy guards
        run: |
          python -m pytest tests/test_no_utcnow_guard.py tests/test_no_direct_utc_now_guard.py -q --tb=no

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: guard-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test runtime
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi==0.104.1 \
            uvicorn==0.24.0 \
            pydantic==2.5.0 \
            email-validator \
            python-multipart==0.0.6 \
            PyJWT==2.11.0 \
            aiohttp==3.9.1 \
            prometheus-client==0.21.1 \
            pytest==7.4.3 \
            httpx==0.25.2

      - name: Run backend tests
        run: |
          python -m pytest tests/ -q --tb=no
