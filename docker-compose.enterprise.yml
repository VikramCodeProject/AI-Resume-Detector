version: '3.9'

services:
  # ==================== DATABASES & CACHING ====================
  
  postgres:
    image: postgres:15-alpine
    container_name: resume-verify-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: resume_verify
      POSTGRES_INITDB_ARGS: "-c max_connections=100 -c shared_buffers=256MB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resume-verify-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: resume-verify-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resume-verify-network
    restart: unless-stopped

  # ==================== EVENT STREAMING ====================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: resume-verify-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - resume-verify-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: resume-verify-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions.sh --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - resume-verify-network
    restart: unless-stopped

  # ==================== BACKEND SERVICES ====================

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-verify-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/resume_verify
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GITHUB_API_KEY: ${GITHUB_API_KEY:-}
      LINKEDIN_API_KEY: ${LINKEDIN_API_KEY:-}
      ETH_RPC_URL: ${ETH_RPC_URL:-https://polygon-rpc.com}
      SMART_CONTRACT_ADDRESS: ${SMART_CONTRACT_ADDRESS:-}
      NFT_CONTRACT_ADDRESS: ${NFT_CONTRACT_ADDRESS:-}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - resume-verify-network
    restart: unless-stopped
    # Uncomment for production:
    # deploy:
    #   replicas: 3
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 1G

  worker-verification:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-verify-worker-verification
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/resume_verify
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: python -m workers.verification_worker
    networks:
      - resume-verify-network
    restart: unless-stopped
    # Uncomment for production:
    # deploy:
    #   replicas: 3
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 1G

  worker-blockchain:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-verify-worker-blockchain
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/resume_verify
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ETH_RPC_URL: ${ETH_RPC_URL:-https://polygon-rpc.com}
      SMART_CONTRACT_ADDRESS: ${SMART_CONTRACT_ADDRESS:-}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: python -m workers.blockchain_worker
    networks:
      - resume-verify-network
    restart: unless-stopped

  # ==================== FRONTEND ====================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-verify-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${FRONTEND_API_URL:-http://localhost:8000}
      VITE_APP_ENV: ${ENVIRONMENT:-production}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - resume-verify-network
    restart: unless-stopped

  # ==================== MONITORING ====================

  prometheus:
    image: prom/prometheus:latest
    container_name: resume-verify-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - resume-verify-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: resume-verify-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - resume-verify-network
    restart: unless-stopped

  # ==================== REVERSE PROXY ====================

  nginx:
    image: nginx:alpine
    container_name: resume-verify-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - resume-verify-network
    restart: unless-stopped

  # ==================== DEVELOPMENT TOOLS (Optional) ====================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: resume-verify-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - resume-verify-network
    restart: unless-stopped
    # Only for development - comment out in PRODUCTION

  adminer:
    image: adminer:latest
    container_name: resume-verify-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - resume-verify-network
    restart: unless-stopped
    # Only for development - comment out in PRODUCTION

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: resume-verify-kafdrop
    ports:
      - "9001:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms32M -Xmx64M"
      SERVER_SERVLET_CONTEXTPATH: "/"
    depends_on:
      - kafka
    networks:
      - resume-verify-network
    restart: unless-stopped
    # Only for development - comment out in PRODUCTION

# ==================== VOLUMES ====================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ==================== NETWORKS ====================

networks:
  resume-verify-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
